<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Divo Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-link:hover { color: #3b82f6; transition: 0.3s; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <nav class="fixed top-0 w-full z-50 glass-card border-b">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="font-bold text-xl gradient-text">Divo Portfolio</span>
            <div class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="index.html" class="nav-link">Tentang</a>
                <a href="cv.html" class="nav-link">CV</a>
                <a href="projects.html" class="nav-link">Karya</a>
                <a href="awards.html" class="nav-link">Sertifikat</a>
                <a href="reflection.html" class="nav-link">Refleksi</a>
                <a href="contact.html" class="text-blue-600 font-bold underline decoration-2 underline-offset-4">Kontak</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-20 px-6 max-w-6xl mx-auto">
        <div class="grid md:grid-cols-2 gap-12">
            <!-- Info Kontak -->
            <div>
                <h2 class="text-3xl font-bold mb-6">Hubungi Saya</h2>
                <p class="text-slate-600 mb-8">Punya pertanyaan atau tertarik untuk bekerja sama? Silakan kirimkan pesan </p>
                
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-100 flex items-center justify-center rounded-2xl text-blue-600">
                            <i data-lucide="mail"></i>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Email</p>
                            <p class="font-medium text-slate-700">divosiagian392@gmail.com</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-100 flex items-center justify-center rounded-2xl text-blue-600">
                            <i data-lucide="linkedin"></i>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">LinkedIn</p>
                            <p class="font-medium text-slate-700">linkedin.com/in/divosiagian</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Form Kontak -->
            <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                <form class="space-y-4">
                    <input type="text" placeholder="Nama Lengkap" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <input type="email" placeholder="Alamat Email" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <textarea placeholder="Pesan Anda" rows="4" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                    <button type="button" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">Kirim Pesan</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-white py-8 border-t text-center text-slate-500 text-sm mt-auto">
        <p>&copy; 2024 Christopher Divo Moses Siagian | Portofolio Digital.</p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
